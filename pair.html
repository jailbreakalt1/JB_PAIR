<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JAILBREAK - WhatsApp Linker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <style>
    :root {
      --bg-1: #03060f;
      --bg-2: #071229;
      --panel: rgba(9, 22, 44, 0.58);
      --panel-edge: rgba(184, 232, 255, 0.24);
      --text: #e6f8ff;
      --muted: #9bc5d8;
      --accent: #60ffd8;
      --danger: #ff6d8f;
      --glass: rgba(208, 245, 255, 0.12);
      --glass-strong: rgba(233, 248, 255, 0.2);
      --shadow: 0 18px 55px rgba(0, 0, 0, 0.42);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      overflow: hidden;
      color: var(--text);
      background: radial-gradient(circle at top, #0f2642 0%, #02050d 55%, #000 100%);
    }

    .matrix-bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .rain-strip {
      position: absolute;
      top: -35vh;
      font-family: 'Consolas', 'Courier New', monospace;
      font-weight: 700;
      letter-spacing: 1px;
      line-height: 0.95;
      font-size: 20px;
      white-space: pre-line;
      opacity: 0.8;
      text-shadow: 0 0 8px currentColor, 0 0 18px currentColor;
      animation: fall linear infinite, hueShift 3.5s ease-in-out infinite;
      filter: saturate(1.2);
    }

    @keyframes fall {
      from { transform: translateY(-20vh); }
      to { transform: translateY(145vh); }
    }

    @keyframes hueShift {
      0% { color: #00ffff; }
      20% { color: #ffff00; }
      40% { color: #7fff00; }
      60% { color: #ff00ff; }
      80% { color: #a855f7; }
      100% { color: #ffffff; }
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 500px;
      padding: 28px;
      border-radius: 20px;
      background: linear-gradient(145deg, var(--panel), rgba(6, 18, 34, 0.48));
      border: 1px solid var(--panel-edge);
      backdrop-filter: blur(22px) saturate(120%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.16);
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 14px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 28px;
      color: #e8feff;
      background: linear-gradient(135deg, rgba(120, 255, 230, 0.2), rgba(165, 99, 255, 0.15));
      border: 1px solid rgba(213, 249, 255, 0.35);
      backdrop-filter: blur(16px);
      box-shadow: inset 0 0 18px rgba(201, 255, 241, 0.22), 0 10px 22px rgba(0, 0, 0, 0.35);
    }

    .title {
      font-size: 28px;
      letter-spacing: 0.12em;
      font-weight: 800;
      color: #dff8ff;
      text-shadow: 0 0 20px rgba(151, 255, 234, 0.28);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
    }

    .toggle-container,
    .input-field,
    .generate-btn,
    .copy-btn,
    .code-display,
    .qr-display {
      background: linear-gradient(140deg, var(--glass), rgba(206, 228, 255, 0.06));
      border: 1px solid rgba(198, 241, 255, 0.24);
      backdrop-filter: blur(16px) saturate(130%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16), 0 10px 20px rgba(2, 14, 26, 0.28);
    }

    .toggle-container {
      display: flex;
      border-radius: 14px;
      padding: 5px;
      margin-bottom: 20px;
      gap: 6px;
    }

    .toggle-option {
      flex: 1;
      padding: 11px 14px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      font-size: 14px;
      color: var(--muted);
      transition: all 0.28s ease;
    }

    .toggle-option.active {
      color: #071224;
      background: linear-gradient(150deg, rgba(142, 255, 231, 0.95), rgba(236, 249, 255, 0.84));
      box-shadow: 0 4px 18px rgba(106, 255, 229, 0.26);
      font-weight: 700;
    }

    .toggle-option:not(.active):hover {
      color: #d9f5ff;
      background: rgba(194, 237, 255, 0.12);
    }

    .input-group {
      margin-bottom: 18px;
      transition: all 0.3s ease;
    }

    .input-group.hidden,
    .generate-btn.hidden {
      display: none;
    }

    .input-label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #c4ebff;
      font-weight: 500;
    }

    .input-field {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      color: #e8f9ff;
      font-size: 15px;
      transition: 0.25s ease;
      outline: none;
    }

    .input-field::placeholder { color: #7fb2c5; }

    .input-field:focus {
      border-color: rgba(132, 255, 230, 0.62);
      box-shadow: 0 0 0 2px rgba(120, 255, 216, 0.2), inset 0 0 12px rgba(140, 244, 255, 0.18);
    }

    .generate-btn,
    .copy-btn {
      width: 100%;
      padding: 12px;
      border-radius: 14px;
      color: #eaffff;
      border: 1px solid rgba(198, 241, 255, 0.28);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .generate-btn {
      margin-bottom: 14px;
      background: linear-gradient(140deg, rgba(106, 255, 215, 0.22), rgba(164, 104, 255, 0.2));
    }

    .copy-btn {
      margin-top: 12px;
      background: linear-gradient(140deg, rgba(245, 255, 255, 0.14), rgba(104, 241, 255, 0.12));
    }

    .generate-btn:hover,
    .copy-btn:hover {
      transform: translateY(-2px) scale(1.01);
      border-color: rgba(183, 251, 255, 0.65);
      box-shadow: 0 12px 28px rgba(5, 18, 31, 0.48), inset 0 1px 0 rgba(255, 255, 255, 0.32);
    }

    .code-display {
      min-height: 48px;
      border-radius: 14px;
      padding: 14px;
      text-align: center;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: #d6f6ff;
    }

    .qr-display {
      display: none;
      padding: 20px;
      border-radius: 14px;
      margin-bottom: 12px;
      text-align: center;
    }

    .qr-image {
      max-width: 270px;
      width: 100%;
      border-radius: 12px;
      margin-bottom: 16px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
    }

    .qr-instructions {
      color: #b8deee;
      font-size: 13px;
      line-height: 1.5;
    }

    .success-message { color: var(--accent); }
    .error-message { color: var(--danger); }

    .loading {
      display: none;
      text-align: center;
      margin: 16px 0;
    }

    .loading i {
      color: #b2fff2;
      font-size: 23px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .footer {
      text-align: center;
      margin-top: 16px;
      color: rgba(169, 212, 231, 0.72);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 520px) {
      .container {
        padding: 22px;
        border-radius: 16px;
      }

      .title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="matrix-bg" id="matrixBg"></div>

  <div class="container">
    <div class="header">
      <div class="logo"><i class="fas fa-user-secret"></i></div>
      <h1 class="title">JAILBREAK</h1>
      <p class="subtitle">Secure WhatsApp device linker</p>
    </div>

    <div class="toggle-container">
      <div class="toggle-option active" data-mode="pair">
        <i class="fas fa-key"></i> Pair Code
      </div>
      <div class="toggle-option" data-mode="qr">
        <i class="fas fa-qrcode"></i> QR Code
      </div>
    </div>

    <div class="input-group" id="inputGroup">
      <label class="input-label">Enter your WhatsApp number with country code</label>
      <input type="text" id="mobileNumber" class="input-field" placeholder="+14155552671" pattern="[+][0-9]{10,}" title="Please enter country code starting with + followed by number">
    </div>

    <button class="generate-btn" id="submit">
      <i class="fas fa-key"></i> Generate Pair Code
    </button>

    <div class="loading" id="loading">
      <i class="fas fa-spinner"></i>
    </div>

    <div class="code-display" id="codeDisplay">
      Your pair code will appear here
    </div>

    <div class="qr-display" id="qrDisplay">
      <img id="qrImage" class="qr-image" src="" alt="QR Code">
      <div class="qr-instructions" id="qrInstructions">
        Scan this QR code with your WhatsApp app
      </div>
    </div>

    <button class="copy-btn" id="copy" onclick="copyCode()">
      <i class="fas fa-copy"></i> Copy Code
    </button>

    <div class="footer">
      <p>© 2026 JAILBREAK</p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    let currentMode = 'pair';

    const matrixBg = document.getElementById('matrixBg');
    const stripText = 'J\nA\nI\nL\nB\nR\nE\nA\nK';

    function createRainStrips() {
      const stripCount = Math.max(18, Math.floor(window.innerWidth / 34));
      matrixBg.innerHTML = '';
      for (let i = 0; i < stripCount; i++) {
        const strip = document.createElement('span');
        strip.className = 'rain-strip';
        strip.textContent = stripText;
        strip.style.left = `${Math.random() * 100}%`;
        strip.style.animationDuration = `${6 + Math.random() * 8}s, ${2 + Math.random() * 4}s`;
        strip.style.animationDelay = `${Math.random() * 7}s`;
        strip.style.fontSize = `${15 + Math.random() * 13}px`;
        strip.style.opacity = `${0.45 + Math.random() * 0.5}`;
        matrixBg.appendChild(strip);
      }
    }

    createRainStrips();
    window.addEventListener('resize', createRainStrips);

    document.querySelectorAll('.toggle-option').forEach(option => {
      option.addEventListener('click', function() {
        const mode = this.dataset.mode;
        if (mode === currentMode) return;

        document.querySelectorAll('.toggle-option').forEach(opt => opt.classList.remove('active'));
        this.classList.add('active');

        currentMode = mode;

        const submitBtn = document.getElementById('submit');
        const inputGroup = document.getElementById('inputGroup');

        if (mode === 'pair') {
          submitBtn.innerHTML = '<i class="fas fa-key"></i> Generate Pair Code';
          submitBtn.classList.remove('hidden');
          inputGroup.classList.remove('hidden');
        } else {
          submitBtn.classList.add('hidden');
          inputGroup.classList.add('hidden');
          generateQRCode();
        }

        document.getElementById('codeDisplay').innerHTML = 'Your pair code will appear here';
        document.getElementById('qrDisplay').style.display = 'none';
        document.getElementById('codeDisplay').style.display = 'flex';
      });
    });

    async function generateQRCode() {
      const codeDisplay = document.getElementById('codeDisplay');
      const qrDisplay = document.getElementById('qrDisplay');
      const loadingSpinner = document.getElementById('loading');

      loadingSpinner.style.display = 'block';
      codeDisplay.innerHTML = '';
      qrDisplay.style.display = 'none';

      try {
        const response = await axios('/qr');

        if (response.data.qr) {
          document.getElementById('qrImage').src = response.data.qr;
          document.getElementById('qrInstructions').innerHTML = response.data.instructions.join('<br>');
          qrDisplay.style.display = 'block';
          codeDisplay.style.display = 'none';
        } else {
          codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Failed to generate QR code</div>';
          codeDisplay.style.display = 'flex';
        }
      } catch (error) {
        console.error('Error generating QR code:', error);
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Error generating QR code. Please try again.</div>';
        codeDisplay.style.display = 'flex';
      } finally {
        loadingSpinner.style.display = 'none';
      }
    }

    document.getElementById('submit').addEventListener('click', async (e) => {
      e.preventDefault();

      const mobileNumberInput = document.getElementById('mobileNumber');
      const codeDisplay = document.getElementById('codeDisplay');
      const qrDisplay = document.getElementById('qrDisplay');
      const loadingSpinner = document.getElementById('loading');

      const mobileNumber = mobileNumberInput.value.trim();
      if (!mobileNumber) {
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Please enter your WhatsApp number</div>';
        return;
      }

      loadingSpinner.style.display = 'block';
      codeDisplay.innerHTML = '';
      qrDisplay.style.display = 'none';

      try {
        const response = await axios(`/pair?number=${mobileNumber.replace(/[^0-9]/g, '')}`);

        const code = response.data.code || 'Service Unavailable';
        if (code === 'Service Unavailable') {
          codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Service Unavailable</div>';
        } else {
          codeDisplay.innerHTML = `<div class="success-message"><i class="fas fa-check-circle"></i> CODE: ${code}</div>`;
        }
        codeDisplay.style.display = 'flex';
      } catch (error) {
        console.error('Error generating code:', error);
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Error generating code. Please try again.</div>';
        codeDisplay.style.display = 'flex';
      } finally {
        loadingSpinner.style.display = 'none';
      }
    });

    function copyCode() {
      const codeDisplay = document.getElementById('codeDisplay').innerText;
      const code = codeDisplay.replace('CODE: ', '');
      navigator.clipboard.writeText(code).then(() => {
        const copyBtn = document.getElementById('copy');
        const originalText = copyBtn.innerHTML;
        copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        setTimeout(() => {
          copyBtn.innerHTML = originalText;
        }, 2000);
      }).catch(err => {
        console.error('Failed to copy text: ', err);
      });
    }
  </script>
</body>
</html>
