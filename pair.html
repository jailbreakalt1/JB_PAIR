<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JAILBREAK - WhatsApp Linker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
  <style>
    :root {
      --bg-1: #050505;
      --bg-2: #121212;
      --panel: rgba(20, 20, 20, 0.86);
      --panel-edge: rgba(255, 255, 255, 0.22);
      --text: #f2f2f2;
      --muted: #b6b6b6;
      --accent: #ffffff;
      --danger: #ff8f8f;
      --glass: rgba(255, 255, 255, 0.08);
      --glass-strong: rgba(255, 255, 255, 0.18);
      --shadow: 0 18px 55px rgba(0, 0, 0, 0.42);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      overflow: hidden;
      color: var(--text);
      background: #000;
    }

    #matrixCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
      opacity: 0.75;
      background: radial-gradient(circle at top, #2a2a2a 0%, #0b0b0b 55%, #000 100%);
    }

    .matrix-bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .rain-strip {
      position: absolute;
      top: -35vh;
      font-family: 'Consolas', 'Courier New', monospace;
      font-weight: 700;
      letter-spacing: 1px;
      line-height: 0.95;
      font-size: 20px;
      white-space: pre-line;
      opacity: 0.8;
      text-shadow: 0 0 8px currentColor, 0 0 18px currentColor;
      animation: fall linear infinite;
      filter: saturate(1.2);
    }

    @keyframes fall {
      from { transform: translateY(-20vh); }
      to { transform: translateY(145vh); }
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 500px;
      padding: 28px;
      border-radius: 20px;
      background: linear-gradient(145deg, var(--panel), rgba(50, 50, 50, 0.55));
      border: 1px solid var(--panel-edge);
      backdrop-filter: blur(18px) saturate(120%);
      background: linear-gradient(145deg, var(--panel), rgba(64, 64, 64, 0.45));
      border: 1px solid var(--panel-edge);
      backdrop-filter: blur(22px) saturate(120%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.16);
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 14px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 28px;
      color: #ffffff;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.14), rgba(130, 130, 130, 0.2));
      border: 1px solid rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(16px);
      box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.2), 0 10px 22px rgba(0, 0, 0, 0.35);
    }

    .title {
      font-size: 28px;
      letter-spacing: 0.12em;
      font-weight: 800;
      color: #f6f6f6;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
    }
    
    .toggle-container,
    .input-field,
    .generate-btn,
    .copy-btn,
    .code-display,
    .qr-display {
      background: linear-gradient(140deg, var(--glass), rgba(255, 255, 255, 0.05));
      border: 1px solid rgba(255, 255, 255, 0.24);
      backdrop-filter: blur(16px) saturate(130%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16), 0 10px 20px rgba(0, 0, 0, 0.38);
    }

    .toggle-container {
      display: flex;
      margin-bottom: 20px;
      gap: 10px;
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 0;
      border-radius: 14px;
      padding: 5px;
      margin-bottom: 20px;
      gap: 6px;
    }

    .toggle-option {
      flex: 1;
      padding: 12px 14px;
      border-radius: 12px;
      padding: 11px 14px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      font-size: 14px;
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: linear-gradient(140deg, rgba(255, 255, 255, 0.08), rgba(192, 192, 192, 0.03));
      backdrop-filter: blur(14px);
      transition: all 0.28s ease;
    }

    .toggle-option.active {
      color: #0e0e0e;
      border-color: rgba(255, 255, 255, 0.75);
      background: linear-gradient(150deg, rgba(240, 240, 240, 0.95), rgba(188, 188, 188, 0.84));
      box-shadow: 0 4px 18px rgba(255, 255, 255, 0.18);
      font-weight: 700;
    }

    .toggle-option:not(.active):hover {
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.45);
      background: rgba(255, 255, 255, 0.12);
    }

    .input-group {
      margin-bottom: 18px;
      transition: all 0.3s ease;
    }

    .input-group.hidden,
    .generate-btn.hidden {
      display: none;
    }

    .input-label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #dadada;
      font-weight: 500;
    }

    .input-field {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      color: #f3f3f3;
      font-size: 15px;
      transition: 0.25s ease;
      outline: none;
    }

    .input-field::placeholder { color: #8d8d8d; }

    .input-field:focus {
      border-color: rgba(255, 255, 255, 0.62);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.16), inset 0 0 12px rgba(255, 255, 255, 0.18);
    }

    .generate-btn,
    .copy-btn {
      width: 100%;
      padding: 12px;
      border-radius: 14px;
      color: #f4f4f4;
      border: 1px solid rgba(255, 255, 255, 0.28);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .generate-btn {
      margin-bottom: 14px;
      background: linear-gradient(140deg, rgba(255, 255, 255, 0.2), rgba(120, 120, 120, 0.22));
    }

    .copy-btn {
      margin-top: 12px;
      background: linear-gradient(140deg, rgba(255, 255, 255, 0.16), rgba(130, 130, 130, 0.16));
    }

    .generate-btn:hover,
    .copy-btn:hover {
      transform: translateY(-2px) scale(1.01);
      border-color: rgba(255, 255, 255, 0.65);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.58), inset 0 1px 0 rgba(255, 255, 255, 0.32);
    }

    .code-display {
      min-height: 48px;
      border-radius: 14px;
      padding: 14px;
      text-align: center;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: #f2f2f2;
    }

    .qr-display {
      display: none;
      padding: 20px;
      border-radius: 14px;
      margin-bottom: 12px;
      text-align: center;
    }

    .qr-image {
      max-width: 270px;
      width: 100%;
      border-radius: 12px;
      margin-bottom: 16px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
    }

    .qr-instructions {
      color: #d2d2d2;
      font-size: 13px;
      line-height: 1.5;
    }

    .success-message { color: var(--accent); }
    .error-message { color: var(--danger); }

    .loading {
      display: none;
      text-align: center;
      margin: 16px 0;
    }

    .loading i {
      color: #efefef;
      font-size: 23px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .footer {
      text-align: center;
      margin-top: 16px;
      color: rgba(196, 196, 196, 0.72);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 520px) {
      .container {
        padding: 22px;
        border-radius: 16px;
      }

      .title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <canvas id="matrixCanvas" aria-hidden="true"></canvas>
  <div class="matrix-bg" id="matrixBg"></div>

  <div class="container">
    <div class="header">
      <div class="logo"><i class="fas fa-user-secret"></i></div>
      <h1 class="title">JAILBREAK</h1>
      <p class="subtitle">Secure WhatsApp device linker</p>
    </div>

    <div class="toggle-container">
      <div class="toggle-option active" data-mode="pair">
        <i class="fas fa-key"></i> Pair Code
      </div>
      <div class="toggle-option" data-mode="qr">
        <i class="fas fa-qrcode"></i> QR Code
      </div>
    </div>

    <div class="input-group" id="inputGroup">
      <label class="input-label">Enter your WhatsApp number with country code</label>
      <input type="text" id="mobileNumber" class="input-field" placeholder="+14155552671" pattern="[+][0-9]{10,}" title="Please enter country code starting with + followed by number">
    </div>

    <button class="generate-btn" id="submit">
      <i class="fas fa-key"></i> Generate Pair Code
    </button>

    <div class="loading" id="loading">
      <i class="fas fa-spinner"></i>
    </div>

    <div class="code-display" id="codeDisplay">
      Your pair code will appear here
    </div>

    <div class="qr-display" id="qrDisplay">
      <img id="qrImage" class="qr-image" src="" alt="QR Code">
      <div class="qr-instructions" id="qrInstructions">
        Scan this QR code with your WhatsApp app
      </div>
    </div>

    <button class="copy-btn" id="copy" onclick="copyCode()">
      <i class="fas fa-copy"></i> Copy Code
    </button>

    <div class="footer">
      <p>© 2026 JAILBREAK</p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    let currentMode = 'pair';

    const matrixCanvas = document.getElementById('matrixCanvas');
    const matrixCtx = matrixCanvas.getContext('2d');
    const matrixChars = 'JAILBREAK';
    const matrixPalette = ['#9a9a9a', '#cccccc', '#f2f2f2', '#777777', '#b8b8b8', '#e5e5e5'];
    let drops = [];
    let fontSize = 18;
    let columns = 0;

    function resizeMatrix() {
      matrixCanvas.width = window.innerWidth;
      matrixCanvas.height = window.innerHeight;
      columns = Math.floor(matrixCanvas.width / fontSize);
      drops = Array(columns).fill(0).map(() => Math.random() * -matrixCanvas.height / fontSize);
    }

    function drawMatrix() {
      matrixCtx.fillStyle = 'rgba(0, 0, 0, 0.13)';
      matrixCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);

      matrixCtx.font = `700 ${fontSize}px Consolas, monospace`;

      for (let i = 0; i < drops.length; i++) {
        const char = matrixChars[Math.floor(Math.random() * matrixChars.length)];
        const x = i * fontSize;
        const y = drops[i] * fontSize;

        const color = matrixPalette[Math.floor(Math.random() * matrixPalette.length)];
        matrixCtx.fillStyle = color;
        matrixCtx.shadowColor = color;
        matrixCtx.shadowBlur = 8;
        matrixCtx.fillText(char, x, y);

        if (y > matrixCanvas.height && Math.random() > 0.975) {
          drops[i] = Math.random() * -18;
        }

        drops[i] += 0.6 + Math.random() * 0.45;
      }

      requestAnimationFrame(drawMatrix);
    }

    resizeMatrix();
    drawMatrix();
    window.addEventListener('resize', resizeMatrix);
    const matrixBg = document.getElementById('matrixBg');
    const stripText = 'J\nA\nI\nL\nB\nR\nE\nA\nK';

    function createRainStrips() {
      const stripCount = Math.max(18, Math.floor(window.innerWidth / 34));
      matrixBg.innerHTML = '';
      for (let i = 0; i < stripCount; i++) {
        const strip = document.createElement('span');
        strip.className = 'rain-strip';
        strip.textContent = stripText;
        strip.style.left = `${Math.random() * 100}%`;
        strip.style.animationDuration = `${6 + Math.random() * 8}s, ${2 + Math.random() * 4}s`;
        strip.style.animationDelay = `${Math.random() * 7}s`;
        strip.style.fontSize = `${15 + Math.random() * 13}px`;
        strip.style.opacity = `${0.45 + Math.random() * 0.5}`;
        matrixBg.appendChild(strip);
      }
    }

    createRainStrips();
    window.addEventListener('resize', createRainStrips);
    document.querySelectorAll('.toggle-option').forEach(option => {
      option.addEventListener('click', function() {
        const mode = this.dataset.mode;
        if (mode === currentMode) return;

        document.querySelectorAll('.toggle-option').forEach(opt => opt.classList.remove('active'));
        this.classList.add('active');

        currentMode = mode;

        const submitBtn = document.getElementById('submit');
        const inputGroup = document.getElementById('inputGroup');

        if (mode === 'pair') {
          submitBtn.innerHTML = '<i class="fas fa-key"></i> Generate Pair Code';
          submitBtn.classList.remove('hidden');
          inputGroup.classList.remove('hidden');
        } else {
          submitBtn.classList.add('hidden');
          inputGroup.classList.add('hidden');
          generateQRCode();
        }

        document.getElementById('codeDisplay').innerHTML = 'Your pair code will appear here';
        document.getElementById('qrDisplay').style.display = 'none';
        document.getElementById('codeDisplay').style.display = 'flex';
      });
    });

    async function generateQRCode() {
      const codeDisplay = document.getElementById('codeDisplay');
      const qrDisplay = document.getElementById('qrDisplay');
      const loadingSpinner = document.getElementById('loading');

      loadingSpinner.style.display = 'block';
      codeDisplay.innerHTML = '';
      qrDisplay.style.display = 'none';

      try {
        const response = await axios('/qr', { timeout: 35000 });

        if (response.data.qr) {
          document.getElementById('qrImage').src = response.data.qr;
          document.getElementById('qrInstructions').innerHTML = response.data.instructions.join('<br>');
          qrDisplay.style.display = 'block';
          codeDisplay.style.display = 'none';
        } else {
          codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Failed to generate QR code</div>';
          codeDisplay.style.display = 'flex';
        }
      } catch (error) {
        console.error('Error generating QR code:', error);
        const serverMessage = error?.response?.data?.code;
        const timeoutMessage = error?.code === 'ECONNABORTED'
          ? 'QR request timed out. The server may be stuck initializing WhatsApp.'
          : null;
        codeDisplay.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-circle"></i> ${serverMessage || timeoutMessage || 'Error generating QR code. Please try again.'}</div>`;
        codeDisplay.style.display = 'flex';
      } finally {
        loadingSpinner.style.display = 'none';
      }
    }

    document.getElementById('submit').addEventListener('click', async (e) => {
      e.preventDefault();

      const mobileNumberInput = document.getElementById('mobileNumber');
      const codeDisplay = document.getElementById('codeDisplay');
      const qrDisplay = document.getElementById('qrDisplay');
      const loadingSpinner = document.getElementById('loading');

      const mobileNumber = mobileNumberInput.value.trim();
      if (!mobileNumber) {
        codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Please enter your WhatsApp number</div>';
        return;
      }

      loadingSpinner.style.display = 'block';
      codeDisplay.innerHTML = '';
      qrDisplay.style.display = 'none';

      try {
        const response = await axios(`/pair?number=${encodeURIComponent(mobileNumber.replace(/[^0-9]/g, ''))}`, { timeout: 35000 });

        const code = response.data.code || 'Service Unavailable';
        if (code === 'Service Unavailable') {
          codeDisplay.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Service Unavailable</div>';
        } else {
          codeDisplay.innerHTML = `<div class="success-message"><i class="fas fa-check-circle"></i> CODE: ${code}</div>`;
        }
        codeDisplay.style.display = 'flex';
      } catch (error) {
        console.error('Error generating code:', error);
        const serverMessage = error?.response?.data?.code;
        const timeoutMessage = error?.code === 'ECONNABORTED'
          ? 'Pair request timed out. This usually means the server cannot reach WhatsApp.'
          : null;
        codeDisplay.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-circle"></i> ${serverMessage || timeoutMessage || 'Error generating code. Please try again.'}</div>`;
        codeDisplay.style.display = 'flex';
      } finally {
        loadingSpinner.style.display = 'none';
      }
    });

    function copyCode() {
      const codeDisplay = document.getElementById('codeDisplay').innerText;
      const code = codeDisplay.replace('CODE: ', '');
      navigator.clipboard.writeText(code).then(() => {
        const copyBtn = document.getElementById('copy');
        const originalText = copyBtn.innerHTML;
        copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        setTimeout(() => {
          copyBtn.innerHTML = originalText;
        }, 2000);
      }).catch(err => {
        console.error('Failed to copy text: ', err);
      });
    }
  </script>
</body>
</html>
